<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#0a7a3f" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <title>NONSAL Inventory MVP</title>
    <link rel="manifest" href="./manifest.json" />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="app">
      <header class="app__header">
        <h1>NONSAL Inventory</h1>
      </header>

      <section id="captureScreen" class="screen">
        <div class="card">
          <label class="label" for="policyHolderInput">Policy Holder</label>
          <input id="policyHolderInput" class="input" type="text" placeholder="Enter policy holder name" />

          <label class="label" for="roomInput">Room</label>
          <input id="roomInput" class="input" list="roomOptions" type="text" placeholder="Select or type room" />
          <datalist id="roomOptions">
            <option value="Living Room"></option>
            <option value="Kitchen"></option>
            <option value="Bedroom"></option>
            <option value="Bathroom"></option>
            <option value="Garage"></option>
          </datalist>

          <div class="capture-checklist" aria-label="Capture progress">
            <div id="photoStepStatus" class="capture-step">
              <span class="capture-step__dot" aria-hidden="true"></span>
              <span>Photo: Needed</span>
            </div>
            <div id="descriptionStepStatus" class="capture-step">
              <span class="capture-step__dot" aria-hidden="true"></span>
              <span>Description: Optional</span>
            </div>
          </div>

          <input id="photoInput" class="hidden-input" type="file" accept="image/*" capture="environment" />
          <div id="cameraWrap" class="camera-wrap" hidden>
            <video id="cameraVideo" class="camera-video" playsinline autoplay muted></video>
            <div class="camera-actions">
              <button id="capturePhotoBtn" class="btn btn--primary" type="button">Capture</button>
              <button id="cancelCameraBtn" class="btn" type="button">Cancel</button>
            </div>
          </div>

          <div id="photoPreviewWrap" class="photo-preview-wrap" hidden>
            <img id="photoPreview" class="photo-preview" alt="Photo preview" />
          </div>

          <label class="label" for="descriptionInput">Description</label>
          <textarea
            id="descriptionInput"
            class="input"
            rows="3"
            placeholder="Tap here, then use keyboard microphone"
          ></textarea>

          <p id="status" class="status" aria-live="polite"></p>
        </div>

        <div class="thumb-actions">
          <button id="takePhotoBtn" class="btn btn--primary btn--big thumb-step thumb-step--photo" type="button">1. Take Photo</button>
          <button id="focusDescriptionBtn" class="btn btn--big thumb-step thumb-step--describe" type="button">2. Describe</button>
          <button id="saveBtn" class="btn btn--primary btn--big thumb-step thumb-step--save" type="button" disabled>3. Save</button>
        </div>
      </section>

      <section id="listScreen" class="screen" hidden>
        <div class="card">
          <label class="label" for="policyHolderEditInput">Policy Holder</label>
          <input id="policyHolderEditInput" class="input" type="text" placeholder="Enter policy holder name" />

          <h2>Saved Entries</h2>
          <ul id="entriesList" class="entries-list"></ul>
          <button id="exportCsvBtn" class="btn" type="button">Export XLSX</button>
          <button id="downloadPhotosBtn" class="btn" type="button">Save Photos</button>
          <button id="clearInventoryBtn" class="btn" type="button">Clear Inventory</button>
        </div>
      </section>

      <nav class="bottom-nav">
        <button id="navCaptureBtn" class="btn btn--small nav-tab-btn" type="button">Capture</button>
        <button id="navListBtn" class="btn btn--small nav-tab-btn" type="button">Entries</button>
      </nav>
    </main>

    <script src="./app.js" defer></script>
  </body>
</html>
